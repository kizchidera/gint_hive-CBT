<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Admin Login</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container" style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);">
        <div class="login-card">
            <div style="text-align: center; font-size: 4rem; margin-bottom: 1rem;">🐝</div>
            <h1>Hive Admin Console</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Super Administrator Access Only</p>
            <form method="POST" action="{{ url_for('super_admin_login') }}">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required autofocus>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Access Dashboard</button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="{{ url_for('login') }}" style="color: var(--primary-500); text-decoration: none;">← Back to Main Login</a>
            </div>
        </div>
    </div>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        if(themeToggle) {
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            });
            if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
        }
    </script>
</body>
</html>
